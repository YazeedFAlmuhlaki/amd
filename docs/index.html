<style>
  :root {
    --bg: #0A0A0C;
    --surface: #111114;
    --surface-2: #16161A;
    --border: rgba(255, 255, 255, 0.10);
    --border-strong: rgba(255, 255, 255, 0.18);
    --text: #F5F6F7;
    --muted: #9BA0A8;
    --radius: 18px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: "Inter", "IBM Plex Sans Arabic", "Segoe UI", -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
    line-height: 1.6;
  }
  html[lang="ar"] body { font-family: "IBM Plex Sans Arabic", "Inter", "Segoe UI", Tahoma, sans-serif; }

  .container { max-width: 1100px; margin: 0 auto; padding: 0 24px; }
  section { padding: 88px 0; }
  a { color: inherit; text-decoration: none; }
  img { max-width: 100%; }

  .kicker {
    display: inline-block;
    font-size: 12px; font-weight: 600; letter-spacing: 0.14em;
    color: var(--muted); text-transform: uppercase;
    border: 1px solid var(--border); border-radius: 100px;
    padding: 7px 16px; margin-bottom: 22px;
  }
  h2.section-title { font-size: clamp(26px, 4vw, 38px); font-weight: 700; margin-bottom: 14px; }
  p.section-sub { color: var(--muted); font-size: 16px; max-width: 640px; margin-bottom: 44px; }

  /* ---------- Nav ---------- */
  nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10, 10, 12, 0.82); backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--border);
  }
  .nav-inner { display: flex; align-items: center; gap: 28px; height: 64px; }
  .brand { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 17px; }
  .brand img { width: 26px; height: 26px; }
  .nav-links { display: flex; gap: 24px; font-size: 13.5px; color: var(--muted); }
  .nav-links a:hover { color: var(--text); }
  .nav-spacer { flex: 1; }
  .lang-btn, .gh-btn {
    font: inherit; font-size: 13px; font-weight: 600;
    color: var(--text); background: none;
    border: 1px solid var(--border-strong); border-radius: 100px;
    padding: 7px 16px; cursor: pointer;
  }
  .lang-btn:hover, .gh-btn:hover { background: rgba(255, 255, 255, 0.06); }

  /* ---------- Hero ---------- */
  .hero { padding: 110px 0 96px; text-align: center; position: relative; overflow: hidden; }
  .hero::before {
    content: ""; position: absolute; inset: auto 0 -40%;
    height: 70%; pointer-events: none;
    background: radial-gradient(ellipse at center, rgba(255, 255, 255, 0.05), transparent 65%);
  }
  /* Brand lockup — always LTR, mirrors the official logo */
  .lockup {
    direction: ltr;
    display: flex; align-items: center; justify-content: center; gap: 26px;
    margin-bottom: 46px;
  }
  .lockup img { width: clamp(84px, 12vw, 128px); height: auto; }
  .lockup .words { text-align: left; }
  .lockup .en { font-family: "Inter", sans-serif; font-size: clamp(48px, 9vw, 84px); font-weight: 800; letter-spacing: -0.03em; line-height: 1; }
  .lockup .ar { font-family: "IBM Plex Sans Arabic", sans-serif; font-size: clamp(24px, 4vw, 38px); font-weight: 600; color: var(--muted); margin-top: 8px; }
  .hero h1 { font-size: clamp(26px, 4.6vw, 44px); font-weight: 700; max-width: 800px; margin: 0 auto 18px; line-height: 1.35; }
  .hero .sub { color: var(--muted); font-size: clamp(15px, 2vw, 18px); max-width: 660px; margin: 0 auto 40px; }
  .cta-row { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 15px; font-weight: 600; border-radius: 100px;
    padding: 14px 30px; cursor: pointer; border: none; font-family: inherit;
  }
  .btn.primary { background: #fff; color: #0A0A0C; }
  .btn.primary:hover { background: #E8E8EA; }
  .btn.ghost { background: none; color: var(--text); border: 1px solid var(--border-strong); }
  .btn.ghost:hover { background: rgba(255, 255, 255, 0.06); }

  /* ---------- Problem / Solution ---------- */
  .duo { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .duo-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 34px;
  }
  .duo-card .tag {
    display: inline-block; font-size: 11px; font-weight: 700; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--muted);
    border: 1px solid var(--border); border-radius: 100px;
    padding: 5px 13px; margin-bottom: 18px;
  }
  .duo-card h3 { font-size: 21px; font-weight: 700; margin-bottom: 12px; }
  .duo-card p { color: var(--muted); font-size: 14.5px; }
  .descriptor {
    direction: ltr; display: inline-block;
    font-family: ui-monospace, "Cascadia Code", Consolas, monospace;
    font-size: 12.5px; color: var(--text);
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: 8px; padding: 3px 9px; margin: 2px;
  }

  /* ---------- Features ---------- */
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
  .feature {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 30px;
    transition: border-color 0.2s ease, transform 0.2s ease;
  }
  .feature:hover { border-color: var(--border-strong); transform: translateY(-3px); }
  .feature .ic {
    width: 46px; height: 46px; border-radius: 13px;
    border: 1px solid var(--border-strong);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 20px;
  }
  .feature .ic svg { width: 21px; height: 21px; stroke: #fff; fill: none; stroke-width: 1.7; stroke-linecap: round; stroke-linejoin: round; }
  .feature h3 { font-size: 16.5px; font-weight: 700; margin-bottom: 8px; }
  .feature p { color: var(--muted); font-size: 13.5px; }

  /* ---------- Demo ---------- */
  .demo-wrap { display: flex; flex-direction: column; align-items: center; gap: 26px; }
  .demo-frame {
    width: min(460px, 92vw); height: 780px;
    border: none; border-radius: 24px;
    background: transparent;
  }
  .demo-hint {
    display: flex; align-items: center; gap: 10px;
    color: var(--muted); font-size: 13.5px;
    border: 1px solid var(--border); border-radius: 100px;
    padding: 9px 20px;
  }
  .demo-hint img { width: 18px; height: 18px; }

  /* ---------- Tech ---------- */
  .arch {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 34px; margin-top: 20px;
    overflow-x: auto;
  }
  .arch svg { display: block; margin: 0 auto; min-width: 620px; }
  .arch text { font-family: inherit; }

  /* ---------- Team ---------- */
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
  .member {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 30px 22px; text-align: center;
  }
  .member .avatar {
    width: 62px; height: 62px; border-radius: 50%;
    border: 1px solid var(--border-strong);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 16px;
  }
  .member .avatar img { width: 30px; height: 30px; }
  .member h3 { font-size: 15px; font-weight: 700; }
  .member p { color: var(--muted); font-size: 12.5px; margin-top: 4px; }

  /* ---------- Footer ---------- */
  footer { border-top: 1px solid var(--border); padding: 42px 0; }
  .foot { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .foot img { width: 22px; height: 22px; }
  .foot .name { font-weight: 700; font-size: 15px; }
  .foot .note { color: var(--muted); font-size: 13px; }
  .foot .spacer { flex: 1; }
  .foot a { color: var(--muted); font-size: 13px; border-bottom: 1px solid var(--border); }
  .foot a:hover { color: var(--text); }

  @media (max-width: 900px) {
    .grid-3 { grid-template-columns: repeat(2, 1fr); }
    .grid-4 { grid-template-columns: repeat(2, 1fr); }
    .duo { grid-template-columns: 1fr; }
    .nav-links { display: none; }
  }
  @media (max-width: 560px) {
    .grid-3 { grid-template-columns: 1fr; }
    section { padding: 64px 0; }
    .lockup { gap: 16px; }
  }
</style>
</head>

let lang = localStorage.getItem('wadhah-lang') || 'ar';

function applyLang() {
  const dict = I18N[lang];
  document.documentElement.lang = lang;
  document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
  document.querySelectorAll('[data-i18n]').forEach((el) => {
    const value = dict[el.dataset.i18n];
    if (value !== undefined) el.textContent = value;
  });
  document.getElementById('lang-toggle').textContent = lang === 'ar' ? 'EN' : 'عربي';
  document.title = lang === 'ar'
    ? 'وضّح — Wadhah | مساعدك البنكي الذكي'
    : 'Wadhah — your AI banking assistant';
}

function toggleLang() {
  lang = lang === 'ar' ? 'en' : 'ar';
  localStorage.setItem('wadhah-lang', lang);
  applyLang();
}

applyLang();
