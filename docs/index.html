<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>وضّح — Wadhah | مساعدك البنكي الذكي</title>
<meta name="description" content="Wadhah (وضّح) — a generative AI assistant inside the banking app that turns confusing bank statements into clear, human answers.">
<link rel="icon" href="assets/wad.png" type="image/png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #15151B;
    --surface: #1D1D24;
    --surface-2: #25252D;
    --border: rgba(255, 255, 255, 0.10);
    --border-strong: rgba(255, 255, 255, 0.18);
    --text: #F5F6F7;
    --muted: #9BA0A8;
    --radius: 18px;
    --accent: #7C6CF0;         /* electric indigo — primary accent */
    --accent-strong: #998CFF;
    --accent-border: rgba(124, 108, 240, 0.38);
    --accent-wash: rgba(124, 108, 240, 0.08);
    --blue: #5B9BFF;           /* chat-bubble blue */
    --blue-border: rgba(91, 155, 255, 0.35);
    --blue-wash: rgba(91, 155, 255, 0.08);
    --violet: #43C6DE;         /* cool cyan (third cycle color) */
    --violet-border: rgba(67, 198, 222, 0.35);
    --violet-wash: rgba(67, 198, 222, 0.08);
    --mint: #2ED3A5;
    --mint-border: rgba(46, 211, 165, 0.35);
    --mint-wash: rgba(46, 211, 165, 0.08);
    --green: #2CBE6E;          /* Saudi green */
    --green-border: rgba(44, 190, 110, 0.40);
    --green-wash: rgba(44, 190, 110, 0.09);
    --green-deep: rgba(0, 108, 53, 0.22);
    --nav-bg: rgba(21, 21, 27, 0.85);
    --box-wash: rgba(255, 255, 255, 0.05);
  }
  html[data-theme="light"] {
    --bg: #F6F7F9;
    --surface: #FFFFFF;
    --surface-2: #EDF0F3;
    --border: rgba(15, 18, 25, 0.10);
    --border-strong: rgba(15, 18, 25, 0.22);
    --text: #15171C;
    --muted: #5D646E;
    --green: #0E8A4C;
    --green-deep: rgba(0, 108, 53, 0.12);
    --nav-bg: rgba(246, 247, 249, 0.85);
    --box-wash: rgba(15, 18, 25, 0.04);
  }
  ::selection { background: var(--accent); color: #fff; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: "Inter", "IBM Plex Sans Arabic", "Segoe UI", -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
    line-height: 1.6;
    transition: background-color 0.25s ease, color 0.25s ease;
  }
  html[lang="ar"] body { font-family: "IBM Plex Sans Arabic", "Inter", "Segoe UI", Tahoma, sans-serif; }

  .container { max-width: 1100px; margin: 0 auto; padding: 0 24px; }
  section { padding: 88px 0; }
  a { color: inherit; text-decoration: none; }
  img { max-width: 100%; }

  .wad-mark { display: block; color: var(--text); aspect-ratio: 104 / 122; }

  .kicker {
    display: inline-block;
    font-size: 12px; font-weight: 600; letter-spacing: 0.14em;
    color: var(--accent-strong); text-transform: uppercase;
    border: 1px solid var(--accent-border); border-radius: 100px;
    background: var(--accent-wash);
    padding: 7px 16px; margin-bottom: 22px;
  }
  h2.section-title { font-size: clamp(26px, 4vw, 38px); font-weight: 700; margin-bottom: 14px; }
  p.section-sub { color: var(--muted); font-size: 16px; max-width: 640px; margin-bottom: 44px; }

  /* ---------- Nav ---------- */
  nav {
    position: sticky; top: 0; z-index: 100;
    background: var(--nav-bg); backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--border);
  }
  .nav-inner { display: flex; align-items: center; gap: 28px; height: 64px; }
  .brand { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 17px; }
  .brand img { width: 26px; height: 26px; }
  .nav-links { display: flex; gap: 24px; font-size: 13.5px; color: var(--muted); }
  .nav-links a:hover { color: var(--accent-strong); }
  .nav-spacer { flex: 1; }
  .lang-btn, .gh-btn {
    font: inherit; font-size: 13px; font-weight: 600;
    color: var(--text); background: none;
    border: 1px solid var(--border-strong); border-radius: 100px;
    padding: 7px 16px; cursor: pointer;
  }
  .lang-btn:hover, .gh-btn:hover { background: var(--box-wash); }
  .theme-btn {
    width: 36px; height: 36px; border-radius: 50%;
    border: 1px solid var(--border-strong); background: none;
    color: var(--text); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex: none;
  }
  .theme-btn:hover { background: var(--box-wash); }
  .theme-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

  /* ---------- Hero ---------- */
  .hero { padding: 110px 0 96px; text-align: center; position: relative; overflow: hidden; }
  .hero::before {
    content: ""; position: absolute; inset: auto 0 -40%;
    height: 70%; pointer-events: none;
    background: radial-gradient(ellipse at center, rgba(124, 108, 240, 0.12), transparent 65%);
  }
  /* Brand lockup — always LTR, mirrors the official logo */
  .lockup {
    direction: ltr;
    display: flex; align-items: center; justify-content: center; gap: 26px;
    margin-bottom: 46px;
  }
  .lockup img { width: clamp(84px, 12vw, 128px); height: auto; }
  .lockup .words { text-align: left; }
  .lockup .en { font-family: "Inter", sans-serif; font-size: clamp(48px, 9vw, 84px); font-weight: 800; letter-spacing: -0.03em; line-height: 1; }
  .lockup .ar { font-family: "IBM Plex Sans Arabic", sans-serif; font-size: clamp(24px, 4vw, 38px); font-weight: 600; color: var(--muted); margin-top: 8px; }
  .hero h1 { font-size: clamp(26px, 4.6vw, 44px); font-weight: 700; max-width: 800px; margin: 0 auto 18px; line-height: 1.35; }
  .hero .sub { color: var(--muted); font-size: clamp(15px, 2vw, 18px); max-width: 660px; margin: 0 auto 40px; }
  .cta-row { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 15px; font-weight: 600; border-radius: 100px;
    padding: 14px 30px; cursor: pointer; border: none; font-family: inherit;
  }
  .btn.primary { background: var(--accent); color: #fff; }
  .btn.primary:hover { background: var(--accent-strong); }
  .btn.ghost { background: none; color: var(--text); border: 1px solid var(--border-strong); }
  .btn.ghost:hover { background: rgba(255, 255, 255, 0.06); }

  /* ---------- Problem → Solution flow ---------- */
  .flow { max-width: 720px; margin: 0 auto; display: flex; flex-direction: column; }
  .duo-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 46px 34px 34px;
    position: relative;
  }
  .duo-card.solution {
    border-color: var(--accent-border);
    background: linear-gradient(180deg, var(--accent-wash), var(--surface) 60%);
  }
  .flow-connector {
    display: flex; flex-direction: column; align-items: center;
    padding: 10px 0 4px;
  }
  .flow-line { width: 2px; height: 30px; }
  .flow-line.top { background: linear-gradient(180deg, transparent, rgba(124, 108, 240, 0.75)); }
  .flow-line.bottom { background: linear-gradient(180deg, rgba(124, 108, 240, 0.75), rgba(124, 108, 240, 0.35)); }
  .flow-node {
    width: 46px; height: 46px; border-radius: 50%;
    border: 1px solid var(--accent-border); background: var(--surface);
    display: flex; align-items: center; justify-content: center;
    margin: 8px 0; position: relative;
    cursor: pointer;
    /* Idle: already softly lit */
    box-shadow: 0 0 20px rgba(124, 108, 240, 0.35);
    transition: border-color 0.25s ease, background 0.25s ease, box-shadow 0.25s ease;
  }
  .flow-node .wad-mark {
    color: #B4A8FF;
    filter: drop-shadow(0 0 5px rgba(153, 140, 255, 0.65));
    transition: color 0.25s ease, filter 0.25s ease;
  }
  /* Idle: two bright signal rings, always emitting */
  .flow-node::before,
  .flow-node::after {
    content: ""; position: absolute; inset: -1px; border-radius: 50%;
    border: 1.5px solid rgba(153, 140, 255, 0.9);
    animation: nodePulse 2s ease-out infinite;
    pointer-events: none;
  }
  .flow-node::before { animation-delay: 1s; }
  /* Lit: hovering the bulb itself OR either badge ignites it hard */
  .flow-node:hover,
  .flow:has(.tag:hover) .flow-node {
    border-color: #C6BDFF;
    background: radial-gradient(circle, rgba(153, 140, 255, 0.65), rgba(124, 108, 240, 0.20) 58%, var(--surface) 80%);
    box-shadow:
      0 0 18px rgba(153, 140, 255, 0.95),
      0 0 50px rgba(124, 108, 240, 0.65),
      0 0 110px rgba(124, 108, 240, 0.35);
  }
  .flow-node:hover .wad-mark,
  .flow:has(.tag:hover) .flow-node .wad-mark {
    color: #FFFFFF;
    filter: drop-shadow(0 0 6px #fff) drop-shadow(0 0 16px rgba(153, 140, 255, 1));
  }
  .flow-node:hover::before, .flow-node:hover::after,
  .flow:has(.tag:hover) .flow-node::before,
  .flow:has(.tag:hover) .flow-node::after { animation-duration: 0.9s; }
  @keyframes nodePulse {
    0% { transform: scale(1); opacity: 0.7; }
    70%, 100% { transform: scale(1.85); opacity: 0; }
  }
  .flow-arrow {
    width: 9px; height: 9px; margin-top: -6px;
    border-right: 2px solid rgba(124, 108, 240, 0.75);
    border-bottom: 2px solid rgba(124, 108, 240, 0.75);
    transform: rotate(45deg);
  }
  /* Badge floats centered over the card's top edge */
  .duo-card .tag {
    position: absolute; top: -17px; left: 50%; transform: translateX(-50%);
    font-size: 14px; font-weight: 700; letter-spacing: 0.06em;
    white-space: nowrap; border-radius: 100px;
    padding: 8px 26px;
    /* المشكلة — all red */
    color: #fff;
    border: 1px solid #FF6B6B;
    background: #D93A3F;
    box-shadow: 0 6px 22px rgba(217, 58, 63, 0.35);
  }
  .duo-card.solution .tag {
    color: var(--accent-strong);
    border: 1px solid var(--accent-border);
    background: linear-gradient(var(--accent-wash), var(--accent-wash)) var(--bg);
    box-shadow: none;
  }
  .duo-card h3 { font-size: 21px; font-weight: 700; margin-bottom: 12px; }
  .duo-card p { color: var(--muted); font-size: 14.5px; }
  .descriptor {
    direction: ltr; display: inline-block;
    font-family: ui-monospace, "Cascadia Code", Consolas, monospace;
    font-size: 12.5px; color: var(--text);
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: 8px; padding: 3px 9px; margin: 2px;
  }

  /* ---------- Features ---------- */
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
  .feature {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 30px;
    transition: border-color 0.2s ease, transform 0.2s ease;
  }
  .feature:hover { border-color: var(--accent-border); transform: translateY(-3px); }
  .feature .ic {
    width: 46px; height: 46px; border-radius: 13px;
    border: 1px solid var(--accent-border); background: var(--accent-wash);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 20px;
  }
  .feature .ic svg { width: 21px; height: 21px; stroke: var(--accent-strong); fill: none; stroke-width: 1.7; stroke-linecap: round; stroke-linejoin: round; }
  /* color cycle — features (3-col) */
  #features .feature:nth-child(3n+2) .ic { border-color: var(--blue-border); background: var(--blue-wash); }
  #features .feature:nth-child(3n+2) .ic svg { stroke: var(--blue); }
  #features .feature:nth-child(3n) .ic { border-color: var(--violet-border); background: var(--violet-wash); }
  #features .feature:nth-child(3n) .ic svg { stroke: var(--violet); }
  /* color cycle — tech (4-col) */
  #tech .feature:nth-child(2) .ic { border-color: var(--violet-border); background: var(--violet-wash); }
  #tech .feature:nth-child(2) .ic svg { stroke: var(--violet); }
  #tech .feature:nth-child(3) .ic { border-color: var(--blue-border); background: var(--blue-wash); }
  #tech .feature:nth-child(3) .ic svg { stroke: var(--blue); }
  #tech .feature:nth-child(4) .ic { border-color: var(--mint-border); background: var(--mint-wash); }
  #tech .feature:nth-child(4) .ic svg { stroke: var(--mint); }
  .feature h3 { font-size: 16.5px; font-weight: 700; margin-bottom: 8px; }
  .feature p { color: var(--muted); font-size: 13.5px; }

  /* ---------- Demo ---------- */
  .demo-wrap { display: flex; flex-direction: column; align-items: center; gap: 26px; }
  .demo-frame {
    width: min(460px, 92vw); height: 780px;
    border: none; border-radius: 24px;
    background: transparent;
  }
  .demo-hint {
    display: flex; align-items: center; gap: 10px;
    color: var(--muted); font-size: 13.5px;
    border: 1px solid var(--border); border-radius: 100px;
    padding: 9px 20px;
  }
  .demo-hint img { width: 18px; height: 18px; }
  .demo-hint .wad-mark { color: var(--blue); }

  /* ---------- Tech ---------- */
  .arch {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 34px; margin-top: 20px;
    overflow-x: auto;
  }
  .arch svg { display: block; margin: 0 auto; min-width: 620px; }
  .arch text { font-family: inherit; }

  /* ---------- Vision (flag watermark across the whole section) ---------- */
  .vision {
    position: relative;
    background: linear-gradient(135deg, #0B301D, #071F13 58%, #0A2A1A);
    border: 1px solid var(--green-border);
    border-radius: var(--radius); padding: 52px 36px;
    text-align: center;
    overflow: hidden;
    box-shadow: 0 18px 44px rgba(0, 0, 0, 0.35);
  }
  .vision > * { position: relative; }
  .vision-flag-bg { position: absolute; inset: 0; pointer-events: none; }
  .vision-flag {
    width: 100%; height: 100%;
    /* fill: stretches edge-to-edge (the SVG allows it via preserveAspectRatio="none") */
    object-fit: fill;
    opacity: 0.34;
    filter: url(#flagWave);
    animation: flagSway 8s ease-in-out infinite;
  }
  /* scale(1.04) keeps the edges covered while the cloth sways */
  @keyframes flagSway {
    0%, 100% { transform: scale(1.04) skewY(-0.5deg) translateX(-5px); }
    50%      { transform: scale(1.04) skewY(0.7deg)  translateX(6px); }
  }
  .vision-flag-bg::after {
    content: ""; position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(4, 24, 14, 0.30), rgba(4, 24, 14, 0.55));
  }
  .vision .wad-mark { color: #2CBE6E; }
  .vision .tag {
    display: inline-block; font-size: 11px; font-weight: 700; letter-spacing: 0.12em;
    text-transform: uppercase; color: #7ADFA8;
    border: 1px solid rgba(122, 223, 168, 0.45); border-radius: 100px;
    background: rgba(4, 24, 14, 0.55);
    padding: 5px 13px; margin-bottom: 18px;
  }
  .vision p {
    font-size: clamp(15px, 2vw, 18px); max-width: 760px;
    margin: 0 auto; line-height: 1.9;
    color: #F2F8F4;
    text-shadow: 0 1px 10px rgba(0, 0, 0, 0.55);
  }

  /* ---------- Team ---------- */
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
  .member {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 30px 22px; text-align: center;
  }
  .member .avatar {
    width: 62px; height: 62px; border-radius: 50%;
    border: 1px solid var(--accent-border); background: var(--accent-wash);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 16px;
  }
  .member .avatar .wad-mark { color: var(--accent-strong); }
  .member:nth-child(2) .avatar { border-color: var(--blue-border); background: var(--blue-wash); }
  .member:nth-child(2) .avatar .wad-mark { color: var(--blue); }
  .member:nth-child(3) .avatar { border-color: var(--violet-border); background: var(--violet-wash); }
  .member:nth-child(3) .avatar .wad-mark { color: var(--violet); }
  .member .avatar img { width: 30px; height: 30px; }
  .member h3 { font-size: 15px; font-weight: 700; }
  .member p { color: var(--muted); font-size: 12.5px; margin-top: 4px; }

  /* ---------- Footer ---------- */
  footer { border-top: 1px solid var(--border); padding: 42px 0; }
  .foot { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .foot img { width: 22px; height: 22px; }
  .foot .name { font-weight: 700; font-size: 15px; }
  .foot .note { color: var(--muted); font-size: 13px; }
  .foot .spacer { flex: 1; }
  .foot a { color: var(--muted); font-size: 13px; border-bottom: 1px solid var(--border); }
  .foot a:hover { color: var(--accent-strong); }

  @media (max-width: 900px) {
    .grid-3 { grid-template-columns: repeat(2, 1fr); }
    .grid-4 { grid-template-columns: repeat(2, 1fr); }
    .nav-links { display: none; }
  }
  @media (max-width: 560px) {
    .grid-3 { grid-template-columns: 1fr; }
    section { padding: 64px 0; }
    .lockup { gap: 16px; }
  }
</style>
</head>
<body>

<!-- Wadhah bulb mark — inlined so it can never fail to load -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <symbol id="wad" viewBox="0 0 104 122">
      <g fill="none" stroke="currentColor" stroke-width="8.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M28 15l8 11"/>
        <path d="M52 7v14"/>
        <path d="M76 15l-8 11"/>
        <path d="M40 89 C 26 81 18 67.5 21 53.5 C 24 37.5 37 27 52 27 C 67 27 80 37.5 83 53.5 C 85.5 65.5 80 76.5 70.5 83 C 65 86.5 62.5 90.5 62.5 96.5"/>
        <path d="M39 108h26"/>
        <path d="M44 120h16"/>
      </g>
    </symbol>
    <filter id="flagWave" x="-12%" y="-12%" width="124%" height="124%">
      <feTurbulence type="fractalNoise" baseFrequency="0.012 0.045" numOctaves="2" seed="4" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="9" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <symbol id="wad-person" viewBox="0 0 104 122">
      <g fill="none" stroke="currentColor" stroke-width="8.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M28 15l8 11"/>
        <path d="M52 7v14"/>
        <path d="M76 15l-8 11"/>
        <circle cx="52" cy="47" r="12.5"/>
        <path d="M31 89 C 31 76.5 40.5 68.5 52 68.5 C 63.5 68.5 73 76.5 73 89"/>
        <path d="M39 108h26"/>
        <path d="M44 120h16"/>
      </g>
    </symbol>
  </defs>
</svg>

<nav>
  <div class="container nav-inner">
    <a class="brand" href="#top" aria-label="Wadhah">
      <svg class="wad-mark" style="width:24px"><use href="#wad"/></svg>
    </a>
    <div class="nav-links">
      <a href="#features" data-i18n="nav_features"></a>
      <a href="#demo" data-i18n="nav_demo"></a>
      <a href="#tech" data-i18n="nav_tech"></a>
      <a href="#team" data-i18n="nav_team"></a>
    </div>
    <div class="nav-spacer"></div>
    <a class="gh-btn" href="https://github.com/anasTrying/amd" target="_blank" rel="noopener">GitHub</a>
    <button class="theme-btn" id="theme-toggle" onclick="toggleTheme()" aria-label="Toggle light/dark mode"></button>
    <button class="lang-btn" id="lang-toggle" onclick="toggleLang()">EN</button>
  </div>
</nav>

<!-- ================= Hero ================= -->
<header class="hero" id="top">
  <div class="container">
    <div class="lockup">
      <svg class="wad-mark" style="width:clamp(76px, 10vw, 108px)"><use href="#wad"/></svg>
      <div class="words">
        <div class="en">Wadhah</div>
        <div class="ar">وضّح</div>
      </div>
    </div>
    <h1 data-i18n="hero_title"></h1>
    <p class="sub" data-i18n="hero_sub"></p>
    <div class="cta-row">
      <a class="btn primary" href="#demo" data-i18n="hero_cta_demo"></a>
    </div>
  </div>
</header>

<!-- ================= Problem / Solution ================= -->
<section id="story">
  <div class="container">
    <div class="flow">
      <div class="duo-card">
        <span class="tag" data-i18n="problem_tag"></span>
        <h3 data-i18n="problem_title"></h3>
        <p data-i18n="problem_body"></p>
        <p style="margin-top:14px">
          <span class="descriptor">APPLE COM BILL</span>
          <span class="descriptor">THAMAR AL-TANMIYA TRADING CO</span>
          <span class="descriptor">ELIXIR BUN CO</span>
        </p>
      </div>
      <div class="flow-connector" aria-hidden="true">
        <div class="flow-line top"></div>
        <div class="flow-node">
          <svg class="wad-mark" style="width:17px"><use href="#wad"/></svg>
        </div>
        <div class="flow-line bottom"></div>
        <div class="flow-arrow"></div>
      </div>
      <div class="duo-card solution">
        <span class="tag" data-i18n="solution_tag"></span>
        <h3 data-i18n="solution_title"></h3>
        <p data-i18n="solution_body"></p>
      </div>
    </div>
  </div>
</section>

<!-- ================= Features ================= -->
<section id="features">
